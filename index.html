<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hoz Auto Electrical · Liquid Glass Invoice System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
        }

        /* Liquid Glass Morphism Effect */
        .glass-card {
            background: rgba(15, 20, 30, 0.55);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .card {
            width: 100%;
            max-width: 1100px;
            padding: 1.8rem 2rem;
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            text-align: center;
            background: linear-gradient(135deg, #f5b042 0%, #e69a2e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        h1 span:last-child {
            background: linear-gradient(135deg, #e33535, #b91c1c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            color: rgba(220, 220, 255, 0.75);
            margin-bottom: 6px;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            font-weight: 400;
            backdrop-filter: blur(2px);
        }

        .mode-bar {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1.2rem 0 0.5rem;
        }

        .mode-btn {
            background: rgba(30, 35, 45, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(245, 176, 66, 0.4);
            padding: 0.5rem 2rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.25s;
        }

        .mode-btn.active {
            background: #b91c1c;
            border-color: #f5b042;
            color: white;
            box-shadow: 0 0 12px rgba(185, 28, 28, 0.5);
        }

        .doc-badge {
            text-align: center;
            font-size: 0.85rem;
            margin: 10px auto;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 5px 28px;
            border-radius: 40px;
            display: inline-block;
            color: #f5b042;
            width: auto;
            font-weight: 600;
            border: 0.5px solid rgba(245, 176, 66, 0.5);
        }

        .paid-toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            margin: 10px auto 20px;
            padding: 8px 24px;
            background: rgba(25, 30, 40, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            width: fit-content;
            border: 1px solid rgba(255,255,240,0.15);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
            background: #2c2f36;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #f5b04280;
        }

        .toggle-switch.active {
            background: #b91c1c;
            border-color: #f5b042;
        }

        .toggle-slider {
            position: absolute;
            height: 22px;
            width: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }

        .toggle-switch.active .toggle-slider {
            left: 28px;
        }

        .paid-label {
            font-weight: 600;
            color: #f5b042;
            font-size: 0.85rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem 1.8rem;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group label {
            font-weight: 700;
            color: #f5b042;
            font-size: 0.7rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        input, select, textarea {
            padding: 10px 14px;
            background: rgba(20, 25, 35, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            font-size: 0.85rem;
            width: 100%;
            color: #f0f0f0;
            transition: 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #f5b042;
            box-shadow: 0 0 0 3px rgba(245, 176, 66, 0.25);
            background: rgba(25, 30, 42, 0.95);
        }

        .section-title {
            grid-column: span 2;
            font-weight: 800;
            color: #e63535;
            margin-top: 12px;
            border-bottom: 2px solid rgba(185, 28, 28, 0.5);
            padding-bottom: 6px;
            font-size: 1rem;
            letter-spacing: -0.2px;
        }

        .repair-task-row {
            grid-column: span 2;
            background: rgba(10, 14, 22, 0.6);
            backdrop-filter: blur(12px);
            padding: 14px;
            border-radius: 28px;
            border: 1px solid rgba(245, 176, 66, 0.25);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .add-task-btn {
            background: #b91c1c;
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .task-item {
            background: rgba(0, 0, 0, 0.4);
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            border: 0.5px solid rgba(255,255,200,0.1);
        }

        .task-desc {
            flex: 3;
            min-width: 160px;
        }

        .task-price {
            width: 120px;
        }

        .remove-task {
            background: #4a2020;
            border: none;
            color: #ffaeae;
            cursor: pointer;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .default-task-toggle {
            background: rgba(20, 25, 35, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border: 1px solid rgba(245, 176, 66, 0.3);
            grid-column: span 2;
        }

        .extra-charges-grid {
            grid-column: span 2;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .generate-btn {
            grid-column: span 2;
            background: linear-gradient(95deg, #b91c1c, #9a1515);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 800;
            border-radius: 60px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(185, 28, 28, 0.4);
        }

        .generate-btn:hover {
            transform: scale(1.01);
            background: #a01818;
            box-shadow: 0 6px 18px rgba(185, 28, 28, 0.6);
        }

        .note {
            grid-column: span 2;
            font-size: 0.7rem;
            color: #aaaacc;
            text-align: center;
            margin-top: 12px;
        }

        .image-note {
            grid-column: span 2;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 8px 16px;
            font-size: 0.7rem;
            color: #ffbc6e;
            text-align: center;
        }

        @media (max-width: 760px) {
            .form-grid, .extra-charges-grid {
                grid-template-columns: 1fr;
            }
            .section-title, .repair-task-row, .default-task-toggle, .extra-charges-grid {
                grid-column: span 1;
            }
            .card {
                padding: 1.2rem;
            }
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #b91c1c;
            backdrop-filter: blur(20px);
            color: white;
            padding: 16px 36px;
            border-radius: 60px;
            z-index: 9999;
            display: none;
            font-weight: bold;
            box-shadow: 0 8px 24px black;
        }
    </style>
</head>
<body>
<div class="loading" id="loadingIndicator">✨ Generating Crystal PDF ...</div>

<div class="glass-card card">
    <h1><span>HOZ</span> <span>AUTO</span></h1>
    <div class="subtitle">ELECTRICAL & DIAGNOSTICS · LIQUID INTERFACE</div>

    <div class="mode-bar">
        <button class="mode-btn" id="invoiceModeBtn" onclick="setMode('invoice')">📄 INVOICE</button>
        <button class="mode-btn" id="quotationModeBtn" onclick="setMode('quotation')">📋 QUOTATION</button>
    </div>

    <div style="text-align:center;">
        <span class="doc-badge" id="documentType">INVOICE</span>
    </div>

    <div id="paidToggleArea" class="paid-toggle-container">
        <span class="paid-label">✓ MARK AS PAID</span>
        <div id="toggleSwitch" class="toggle-switch" onclick="togglePaid()">
            <div class="toggle-slider"></div>
        </div>
    </div>

    <div class="form-grid">
        <div class="field-group"><label>👤 CLIENT NAME</label><input type="text" id="clientName" placeholder="Full name"></div>
        <div class="field-group"><label>🚗 VEHICLE REGISTRATION</label><input type="text" id="vehicleReg" placeholder="GP 01 XY"></div>
        <div class="field-group"><label>🏭 MAKE & MODEL</label><input type="text" id="carModel" placeholder="BMW 330i, Hilux"></div>
        <div class="field-group"><label>📞 CONTACT NUMBER</label><input type="text" id="contactNum" placeholder="078 123 4567"></div>

        <div class="default-task-toggle">
            <label><input type="checkbox" id="defaultDiagnosticToggle"> 🔍 Diagnostic & Fault Code Clearing</label>
            <span class="default-task-price">R 300.00</span>
        </div>

        <div class="repair-task-row">
            <div class="task-header">
                <label>🔧 ADDITIONAL TASKS / REPAIRS</label>
                <button type="button" class="add-task-btn" onclick="addTask()">+ ADD TASK</button>
            </div>
            <div id="tasksContainer"></div>
        </div>

        <div class="section-title">💰 EXTRA CHARGES & ADJUSTMENTS</div>
        <div class="extra-charges-grid">
            <div class="field-group"><label>🔧 LABOUR (R)</label><input type="number" id="labourCharges" min="0" step="0.01" placeholder="0.00"></div>
            <div class="field-group"><label>➕ PARTS (R)</label><input type="number" id="extraCharges" min="0" step="0.01" placeholder="0.00"></div>
            <div class="field-group"><label>🎁 DISCOUNT (R)</label><input type="number" id="discountAmount" min="0" step="0.01" placeholder="0.00"></div>
            <div class="field-group"><label>💸 TIP / GRATUITY (R)</label><input type="number" id="tipAmount" min="0" step="0.01" placeholder="0.00"></div>
            <div class="field-group"><label>🏦 AMOUNT RECEIVED</label><input type="number" id="amountPaid" min="0" step="0.01" placeholder="0.00"></div>
        </div>

        <div class="image-note" id="imageStatus">🌀 Loading assets with crisp rendering ...</div>
        <button class="generate-btn" onclick="generatePDF()">✨ GENERATE & SEND ✨</button>
        <div class="note">⚡ HOZ AUTO ELECTRICAL · Precision Diagnostics · Liquid Glass Interface</div>
    </div>
</div>

<script>
    let mode = "invoice";
    let paidEnabled = false;
    let taskCounter = 0;
    
    // Image assets with HIGH QUALITY rendering (no blur, proper scaling)
    let logoLoaded = false;
    let paidLoaded = false;
    let logoImgData = null;
    let paidImgData = null;
    let logoNaturalWidth = 0, logoNaturalHeight = 0;

    const docTypeSpan = document.getElementById("documentType");
    const invoiceBtn = document.getElementById("invoiceModeBtn");
    const quotationBtn = document.getElementById("quotationModeBtn");
    const paidToggleArea = document.getElementById("paidToggleArea");
    const toggleSwitch = document.getElementById("toggleSwitch");
    const imageStatus = document.getElementById("imageStatus");

    // HIGH QUALITY logo loader - preserve exact sharpness
    const logoImg = new Image();
    logoImg.crossOrigin = "Anonymous";
    logoImg.onload = function() {
        logoLoaded = true;
        logoNaturalWidth = logoImg.naturalWidth;
        logoNaturalHeight = logoImg.naturalHeight;
        
        // Create canvas at original size to avoid quality loss
        const canvas = document.createElement('canvas');
        canvas.width = logoNaturalWidth;
        canvas.height = logoNaturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(logoImg, 0, 0, logoNaturalWidth, logoNaturalHeight);
        // Use high quality PNG
        logoImgData = canvas.toDataURL('image/png', 1.0);
        
        imageStatus.innerHTML = '✅ Crisp Logo Ready | ' + (paidLoaded ? '✅ Paid stamp ready' : '⏳ Loading paid stamp...');
        imageStatus.style.color = '#bbffaa';
    };
    logoImg.onerror = function() {
        logoLoaded = false;
        imageStatus.innerHTML = '⚠️ logo.png missing (using text fallback) | ' + (paidLoaded ? '✅ Paid stamp ready' : '⏳ Loading paid...');
        imageStatus.style.color = '#ffaa88';
        // create sharp text fallback
        const canvas = document.createElement('canvas');
        canvas.width = 200;
        canvas.height = 200;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#b91c1c';
        ctx.fillRect(0, 0, 200, 200);
        ctx.fillStyle = '#f5b042';
        ctx.font = 'bold 72px "Segoe UI"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('HA', 100, 105);
        logoImgData = canvas.toDataURL('image/png');
        logoLoaded = true;
    };
    logoImg.src = "assets/logo.png?" + Date.now();

    // Paid stamp high quality
    const paidImg = new Image();
    paidImg.crossOrigin = "Anonymous";
    paidImg.onload = function() {
        paidLoaded = true;
        const canvas = document.createElement('canvas');
        let w = paidImg.width;
        let h = paidImg.height;
        const maxW = 180;
        const maxH = 70;
        if (w > maxW) { h = (h * maxW) / w; w = maxW; }
        if (h > maxH) { w = (w * maxH) / h; h = maxH; }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(paidImg, 0, 0, w, h);
        paidImgData = canvas.toDataURL('image/png', 0.95);
        imageStatus.innerHTML = (logoLoaded ? '✅ Logo crisp' : '⚠️ logo missing') + ' | ✅ Paid stamp HD';
        imageStatus.style.color = '#bbffaa';
    };
    paidImg.onerror = function() {
        paidLoaded = false;
        imageStatus.innerHTML = (logoLoaded ? '✅ Logo crisp' : '⚠️ logo missing') + ' | ⚠️ paid.png missing (text stamp)';
        imageStatus.style.color = '#ffaa88';
    };
    paidImg.src = "assets/paid.png?" + Date.now();

    function setMode(selectedMode) {
        mode = selectedMode;
        if (mode === "invoice") {
            invoiceBtn.classList.add("active");
            quotationBtn.classList.remove("active");
            docTypeSpan.innerText = "INVOICE";
            paidToggleArea.style.display = "flex";
        } else {
            quotationBtn.classList.add("active");
            invoiceBtn.classList.remove("active");
            docTypeSpan.innerText = "QUOTATION";
            paidToggleArea.style.display = "none";
            paidEnabled = false;
            toggleSwitch.classList.remove("active");
        }
    }

    function togglePaid() {
        if (mode !== "invoice") return;
        paidEnabled = !paidEnabled;
        if (paidEnabled) toggleSwitch.classList.add("active");
        else toggleSwitch.classList.remove("active");
    }

    function addTask() {
        const container = document.getElementById("tasksContainer");
        const taskDiv = document.createElement("div");
        taskDiv.className = "task-item";
        taskDiv.setAttribute("data-id", taskCounter);
        taskDiv.innerHTML = `
            <div class="task-desc"><input type="text" class="task-desc-input" placeholder="Description (e.g., Starter repair)" value=""></div>
            <div class="task-price"><input type="number" class="task-price-input" placeholder="Amount (R)" step="0.01" value=""></div>
            <button class="remove-task" onclick="removeTask(this)">✖</button>
        `;
        container.appendChild(taskDiv);
        taskCounter++;
    }

    function removeTask(btn) {
        btn.closest(".task-item").remove();
    }

    function getTasks() {
        const tasks = [];
        if (document.getElementById("defaultDiagnosticToggle")?.checked) {
            tasks.push({ description: "Diagnostic & Fault Code Clearing", amount: 300 });
        }
        document.querySelectorAll(".task-item").forEach(item => {
            const desc = item.querySelector(".task-desc-input")?.value.trim() || "";
            const priceVal = item.querySelector(".task-price-input")?.value;
            let price = (priceVal && priceVal !== "") ? parseFloat(priceVal) : 0;
            if (isNaN(price)) price = 0;
            if (desc !== "" || price > 0) {
                tasks.push({ description: desc || "Service", amount: price });
            }
        });
        return tasks;
    }

    function getNextDocumentNumber() {
        let key = mode === "invoice" ? "HOZ_invoiceCounter" : "HOZ_quotationCounter";
        let last = parseInt(localStorage.getItem(key));
        if (isNaN(last) || last < 70) last = 70;
        else last += 1;
        localStorage.setItem(key, last);
        return String(last).padStart(3, "0");
    }

    function generatePDF() {
        const loadingDiv = document.getElementById("loadingIndicator");
        loadingDiv.style.display = "block";
        
        setTimeout(() => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4', compress: true });
            
            let y = 20;
            const client = document.getElementById("clientName").value || "Walk-in Client";
            const reg = document.getElementById("vehicleReg").value || "N/A";
            const car = document.getElementById("carModel").value || "Not specified";
            const contact = document.getElementById("contactNum").value || "-";
            const docNumber = getNextDocumentNumber();
            const docRef = mode === "invoice" ? `HOZ-INV-${docNumber}` : `HOZ-QUO-${docNumber}`;
            const today = new Date().toLocaleDateString("en-ZA");
            
            // ~~~~~~ HIGH QUALITY LOGO (preserve aspect, no blur) ~~~~~~
            if (logoLoaded && logoImgData) {
                try {
                    let logoWidthMm = 28;
                    let aspect = logoNaturalHeight / logoNaturalWidth;
                    let logoHeightMm = logoWidthMm * aspect;
                    if (logoHeightMm > 28) { logoHeightMm = 28; logoWidthMm = 28 / aspect; }
                    doc.addImage(logoImgData, 'PNG', 15, 5, logoWidthMm, logoHeightMm);
                } catch(e) { console.warn(e); }
            }
            
            let headerOffset = (logoLoaded && logoImgData) ? 50 : 15;
            doc.setFontSize(18);
            doc.setFont(undefined, "bold");
            doc.setTextColor(25, 25, 30);
            doc.text("HOZ AUTO ELECTRICAL", headerOffset, 14);
            doc.setFontSize(8);
            doc.setTextColor(100, 100, 120);
            doc.text("Specialists in vehicle electrical repairs & diagnostics", headerOffset, 20);
            
            doc.setFontSize(12);
            doc.setTextColor(185, 28, 28);
            doc.text(mode === "invoice" ? "INVOICE" : "QUOTATION", 155, 15);
            doc.setFontSize(8);
            doc.setTextColor(80, 80, 100);
            doc.text(docRef, 155, 22);
            doc.text(`Date: ${today}`, 155, 28);
            
            y = 42;
            doc.setFontSize(8);
            doc.setTextColor(185, 28, 28);
            doc.text("BILL TO:", 15, y);
            doc.setTextColor(40, 40, 50);
            doc.text(client, 15, y+5);
            doc.text(`Vehicle: ${car}`, 15, y+10);
            doc.text(`Reg: ${reg} | Contact: ${contact}`, 15, y+15);
            
            y = 66;
            doc.setFillColor(245, 245, 250);
            doc.rect(14, y-3, 182, 6.5, 'F');
            doc.setTextColor(185, 28, 28);
            doc.setFont(undefined, "bold");
            doc.text("DESCRIPTION", 16, y);
            doc.text("AMOUNT (R)", 160, y);
            y += 7;
            let subtotal = 0;
            const tasks = getTasks();
            doc.setFont(undefined, "normal");
            doc.setTextColor(0, 0, 0);
            
            tasks.forEach(task => {
                let descLine = task.description.length > 48 ? task.description.slice(0,45)+"..." : task.description;
                doc.text(descLine, 16, y);
                if (task.amount > 0) {
                    doc.text(`R ${task.amount.toFixed(2)}`, 160, y);
                    subtotal += task.amount;
                } else {
                    doc.text("—", 160, y);
                }
                y += 5.2;
                if (y > 250) { doc.addPage(); y = 20; }
            });
            if (tasks.length === 0) { doc.text("-- No tasks added --", 16, y); y+=5; }
            
            const labour = parseFloat(document.getElementById("labourCharges")?.value) || 0;
            const parts = parseFloat(document.getElementById("extraCharges")?.value) || 0;
            const discount = parseFloat(document.getElementById("discountAmount")?.value) || 0;
            const tip = parseFloat(document.getElementById("tipAmount")?.value) || 0;
            
            if (labour > 0) { doc.text("Labour Charges", 16, y); doc.text(`R ${labour.toFixed(2)}`, 160, y); subtotal += labour; y+=5; }
            if (parts > 0) { doc.text("Parts", 16, y); doc.text(`R ${parts.toFixed(2)}`, 160, y); subtotal += parts; y+=5; }
            if (discount > 0) { doc.text("Discount", 16, y); doc.text(`- R ${discount.toFixed(2)}`, 160, y); subtotal -= discount; y+=5; }
            if (tip > 0) { doc.text("Tip / Gratuity", 16, y); doc.text(`R ${tip.toFixed(2)}`, 160, y); subtotal += tip; y+=5; }
            
            const paidAmount = parseFloat(document.getElementById("amountPaid")?.value) || 0;
            let grandTotal = Math.max(0, subtotal);
            let balance = Math.max(0, grandTotal - paidAmount);
            y += 3;
            doc.line(14, y-1, 196, y-1);
            doc.setFont(undefined, "bold");
            doc.setTextColor(185,28,28);
            doc.text(`TOTAL: R ${grandTotal.toFixed(2)}`, 138, y+3);
            y += 8;
            if (mode === "invoice") {
                doc.text(`Amount Paid: R ${paidAmount.toFixed(2)}`, 138, y);
                y+=5;
                doc.text(`Balance Due: R ${balance.toFixed(2)}`, 138, y);
                y+=7;
                if (paidEnabled || (paidAmount >= grandTotal && grandTotal>0)) doc.text("✓ PAID IN FULL", 138, y);
                else if (paidAmount>0 && paidAmount<grandTotal) doc.text("⏳ PARTIAL PAYMENT", 138, y);
            }
            
            if (mode === "quotation") {
                let bankY = doc.internal.pageSize.height - 34;
                doc.setFontSize(7);
                doc.setTextColor(185,28,28);
                doc.text("BANKING DETAILS", 15, bankY);
                doc.setTextColor(50,50,70);
                doc.text("NedBank | Account Holder: Hoz Auto Electrical And Diagnostics", 15, bankY+4);
                doc.text("Account Number: 1341809366 | PayShap: 0836813973@nedbank", 15, bankY+8);
            }
            
            if (mode === "invoice" && paidEnabled) {
                let stampY = doc.internal.pageSize.height - 24;
                if (paidLoaded && paidImgData) {
                    try { doc.addImage(paidImgData, 'PNG', 15, stampY-12, 24, 11); } catch(e) { doc.text("✓ PAID", 18, stampY-4); }
                } else { doc.setFontSize(9); doc.setTextColor(40,160,60); doc.text("✓ PAID", 18, stampY-4); }
            }
            
            doc.setFontSize(6);
            doc.setTextColor(110,110,130);
            doc.text("HOZ Auto Electrical & Diagnostics · Thank you !", 15, doc.internal.pageSize.height - 8);
            
            const pdfBlob = doc.output("blob");
            const fileName = docRef + ".pdf";
            const url = URL.createObjectURL(pdfBlob);
            const a = document.createElement("a");
            a.href = url;
            a.download = fileName;
            a.click();
            
            const shareFile = new File([pdfBlob], fileName, { type: "application/pdf" });
            if (navigator.canShare && navigator.canShare({ files: [shareFile] })) {
                navigator.share({ title: mode === "invoice" ? "Invoice" : "Quotation", text: `HOZ AUTO - ${client}`, files: [shareFile] }).catch(e=>console.log);
            }
            setTimeout(() => { URL.revokeObjectURL(url); loadingDiv.style.display = "none"; }, 500);
        }, 100);
    }
    
    setMode("invoice");
    addTask(); // start with one clean task
</script>
